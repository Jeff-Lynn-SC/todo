<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Home</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(160deg, #1b3410 0%, #253d14 50%, #182d0e 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 3rem;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: #e8d888;
    letter-spacing: 0.1em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    margin-bottom: 0.3rem;
  }
  .sub {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: #7aaa58;
    letter-spacing: 0.12em;
    margin-bottom: 2rem;
  }

  .card {
    width: 100%;
    max-width: 680px;
    border: 1px solid #4a7c28;
    outline: 3px solid #2a5010;
    outline-offset: 3px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  svg { display: block; width: 100%; height: auto; }

  .legend {
    background: #0e1e08;
    padding: 1.4rem 1.75rem;
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
    border-top: 1px solid #3a6820;
  }
  .leg-icon { font-size: 2rem; flex-shrink: 0; line-height: 1; margin-top: 4px; }
  .leg-kw {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: #e8d888;
    letter-spacing: 0.06em;
    margin-bottom: 0.55rem;
  }
  .leg-lines {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: #7aaa58;
    line-height: 1.85;
  }
  .leg-lines span {
    display: block;
    padding-left: 0.75rem;
    border-left: 1.5px solid #3a6820;
  }

  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; outline: none; }
    h1 { color: #1a1a1a; text-shadow: none; }
    .sub { color: #555; }
    .legend { background: #f5f5f5; }
    .leg-kw { color: #1a1a1a; }
    .leg-lines { color: #333; }
  }
</style>
</head>
<body>

<h1>Coming Home</h1>
<p class="sub">a guide for getting settled</p>

<div class="card">
<svg viewBox="0 0 660 970" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Parchment background -->
  <radialGradient id="bg" cx="50%" cy="38%" r="75%">
    <stop offset="0%"   stop-color="#f8f0d8"/>
    <stop offset="55%"  stop-color="#efe4c2"/>
    <stop offset="100%" stop-color="#e2d2a8"/>
  </radialGradient>

  <!-- Subtle aged texture overlay -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>

  <!-- Standard arrowhead – dark forest green -->
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 z" fill="#1e3a10"/>
  </marker>

  <!-- Loop arrowhead – lighter sage -->
  <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 z" fill="#4a7c2a"/>
  </marker>

</defs>

<!-- ── Background ───────────────────────────── -->
<rect width="660" height="970" fill="url(#bg)"/>

<!-- Grain overlay for aged-parchment feel -->
<rect width="660" height="970" fill="#b8963c" opacity="0.06" filter="url(#grain)"/>

<!-- ── Decorative double border ─────────────── -->
<rect x="8"  y="8"  width="644" height="954" fill="none" stroke="#7a5c20" stroke-width="1.2" opacity="0.5"/>
<rect x="13" y="13" width="634" height="944" fill="none" stroke="#7a5c20" stroke-width="0.5" opacity="0.35"/>

<!-- ═══════════════════════════════════════════
     CORNER LEAF DECORATIONS
     Each corner: a small fan of elliptical leaves
════════════════════════════════════════════ -->

<!-- TL corner – leaves fan toward bottom-right -->
<g opacity="0.52" transform="translate(13,13)">
  <ellipse cx="16" cy="44" rx="6.5" ry="19" transform="rotate(-60,16,44)" fill="#3a6820"/>
  <ellipse cx="27" cy="32" rx="6.5" ry="18" transform="rotate(-35,27,32)" fill="#4a7c30"/>
  <ellipse cx="39" cy="22" rx="6"   ry="17" transform="rotate(-10,39,22)" fill="#3a6820"/>
  <ellipse cx="48" cy="13" rx="5.5" ry="15" transform="rotate(18,48,13)"  fill="#527c38"/>
  <!-- stem -->
  <path d="M18,46 Q14,56 10,65" stroke="#3a5c18" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- berry/bud -->
  <circle cx="10" cy="65" r="3" fill="#b87a20" opacity="0.65"/>
  <circle cx="50" cy="11" r="2" fill="#8ab84a" opacity="0.55"/>
</g>

<!-- TR corner – mirror of TL -->
<g opacity="0.52" transform="translate(647,13) scale(-1,1)">
  <ellipse cx="16" cy="44" rx="6.5" ry="19" transform="rotate(-60,16,44)" fill="#3a6820"/>
  <ellipse cx="27" cy="32" rx="6.5" ry="18" transform="rotate(-35,27,32)" fill="#4a7c30"/>
  <ellipse cx="39" cy="22" rx="6"   ry="17" transform="rotate(-10,39,22)" fill="#3a6820"/>
  <ellipse cx="48" cy="13" rx="5.5" ry="15" transform="rotate(18,48,13)"  fill="#527c38"/>
  <path d="M18,46 Q14,56 10,65" stroke="#3a5c18" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <circle cx="10" cy="65" r="3" fill="#b87a20" opacity="0.65"/>
  <circle cx="50" cy="11" r="2" fill="#8ab84a" opacity="0.55"/>
</g>

<!-- BL corner – flip of TL vertically -->
<g opacity="0.52" transform="translate(13,957) scale(1,-1)">
  <ellipse cx="16" cy="44" rx="6.5" ry="19" transform="rotate(-60,16,44)" fill="#3a6820"/>
  <ellipse cx="27" cy="32" rx="6.5" ry="18" transform="rotate(-35,27,32)" fill="#4a7c30"/>
  <ellipse cx="39" cy="22" rx="6"   ry="17" transform="rotate(-10,39,22)" fill="#3a6820"/>
  <ellipse cx="48" cy="13" rx="5.5" ry="15" transform="rotate(18,48,13)"  fill="#527c38"/>
  <circle cx="50" cy="11" r="2" fill="#8ab84a" opacity="0.55"/>
</g>

<!-- BR corner – flip of TR vertically -->
<g opacity="0.52" transform="translate(647,957) scale(-1,-1)">
  <ellipse cx="16" cy="44" rx="6.5" ry="19" transform="rotate(-60,16,44)" fill="#3a6820"/>
  <ellipse cx="27" cy="32" rx="6.5" ry="18" transform="rotate(-35,27,32)" fill="#4a7c30"/>
  <ellipse cx="39" cy="22" rx="6"   ry="17" transform="rotate(-10,39,22)" fill="#3a6820"/>
  <ellipse cx="48" cy="13" rx="5.5" ry="15" transform="rotate(18,48,13)"  fill="#527c38"/>
  <circle cx="50" cy="11" r="2" fill="#8ab84a" opacity="0.55"/>
</g>

<!-- ═══════════════════════════════════════════
     Small leaf accents beside each shape
════════════════════════════════════════════ -->

<!-- Leaf beside START -->
<ellipse cx="226" cy="90" rx="5" ry="12" transform="rotate(-30,226,90)" fill="#4a7c30" opacity="0.45"/>
<ellipse cx="434" cy="90" rx="5" ry="12" transform="rotate(30,434,90)"  fill="#4a7c30" opacity="0.45"/>

<!-- Small leaf trios beside Q4 / Q5 (bottom of chart) -->
<g opacity="0.35" transform="translate(196,758)">
  <ellipse cx="8" cy="20" rx="4" ry="10" transform="rotate(-30,8,20)" fill="#3a6820"/>
  <ellipse cx="14" cy="14" rx="4" ry="10" transform="rotate(5,14,14)"  fill="#4a7c30"/>
</g>
<g opacity="0.35" transform="translate(452,758) scale(-1,1)">
  <ellipse cx="8" cy="20" rx="4" ry="10" transform="rotate(-30,8,20)" fill="#3a6820"/>
  <ellipse cx="14" cy="14" rx="4" ry="10" transform="rotate(5,14,14)"  fill="#4a7c30"/>
</g>

<!-- ═══════════════════════════════════════════
     FLOWCHART SHAPES
     Layout (all centred at x=330):
       START    cy=90
       Q1       cy=202   hw=150 hh=50
       NUTELLA  left=498 cy=210 w=148 h=70
       Q2       cy=372   hw=165 hh=52
       FEETUP   cx=78    cy=372
       TODO     top=471  h=62
       Q3       cy=632   hw=145 hh=52
       GOSTART  cx=566   cy=632
       Q4       top=749  h=62
       Q5       top=879  h=62
════════════════════════════════════════════ -->

<!-- 1 ── START ─────────────────────────────── -->
<ellipse cx="330" cy="90" rx="110" ry="27"
         fill="#c4dba8" stroke="#1e3a10" stroke-width="2.2"/>
<text x="330" y="90" text-anchor="middle" dominant-baseline="middle"
      font-family="'EB Garamond',serif" font-size="14.5" fill="#0e1e06">I come home</text>

<!-- 2 ── Q1 DIAMOND ─────────────────────────
     top(330,152) right(480,202) bot(330,252) left(180,202) -->
<polygon points="330,152 480,202 330,252 180,202"
         fill="#edd89e" stroke="#1e3a10" stroke-width="2.2"/>
<text text-anchor="middle" font-family="'EB Garamond',serif" font-size="12.5" fill="#1a0e00">
  <tspan x="330" y="196">Do I need my</tspan>
  <tspan x="330" dy="14">space right now?</tspan>
</text>
<text x="257" y="193" font-family="'EB Garamond',serif" font-size="9"
      font-style="italic" fill="#8c6820">Q1</text>

<!-- 3 ── NUTELLA BOX ─────────────────────────
     left=498 top=175 w=148 h=70              -->
<rect x="498" y="175" width="148" height="70"
      fill="#b8d098" stroke="#1e3a10" stroke-width="2.2"/>
<text text-anchor="middle" font-family="'EB Garamond',serif" font-size="12" fill="#0e1e06">
  <tspan x="572" y="197">Dad says</tspan>
  <tspan x="572" dy="15" font-style="italic" font-size="14">"Nutella"</tspan>
  <tspan x="572" dy="15">after 1 hour</tspan>
</text>

<!-- 4 ── Q2 DIAMOND ─────────────────────────
     top(330,320) right(495,372) bot(330,424) left(165,372) -->
<polygon points="330,320 495,372 330,424 165,372"
         fill="#edd89e" stroke="#1e3a10" stroke-width="2.2"/>
<text text-anchor="middle" font-family="'EB Garamond',serif" font-size="12.5" fill="#1a0e00">
  <tspan x="330" y="365">Do I need to do</tspan>
  <tspan x="330" dy="14">anything today?</tspan>
</text>
<text x="243" y="365" font-family="'EB Garamond',serif" font-size="9"
      font-style="italic" fill="#8c6820">Q2</text>

<!-- 5 ── FEET UP ──────────────────────────── -->
<ellipse cx="78" cy="372" rx="68" ry="27"
         fill="#c4dba8" stroke="#1e3a10" stroke-width="2.2"/>
<text x="78" y="372" text-anchor="middle" dominant-baseline="middle"
      font-family="'EB Garamond',serif" font-size="12.5" fill="#0e1e06">Put my feet up</text>

<!-- 6 ── TO-DO BOX ───────────────────────────
     left=220 top=471 w=220 h=62              -->
<rect x="220" y="471" width="220" height="62"
      fill="#ede2c0" stroke="#1e3a10" stroke-width="2.2"/>
<text text-anchor="middle" font-family="'EB Garamond',serif" font-size="12.5" fill="#1a0e00">
  <tspan x="330" y="496">Write it into the</tspan>
  <tspan x="330" dy="16">ordered to-do list</tspan>
</text>

<!-- 7 ── Q3 DIAMOND ─────────────────────────
     top(330,580) right(475,632) bot(330,684) left(185,632) -->
<polygon points="330,580 475,632 330,684 185,632"
         fill="#edd89e" stroke="#1e3a10" stroke-width="2.2"/>
<text text-anchor="middle" font-family="'EB Garamond',serif" font-size="12.5" fill="#1a0e00">
  <tspan x="330" y="625">Can I start</tspan>
  <tspan x="330" dy="14">straight away?</tspan>
</text>
<text x="252" y="625" font-family="'EB Garamond',serif" font-size="9"
      font-style="italic" fill="#8c6820">Q3</text>

<!-- 8 ── START! ───────────────────────────── -->
<ellipse cx="566" cy="632" rx="74" ry="27"
         fill="#c4dba8" stroke="#1e3a10" stroke-width="2.2"/>
<text x="566" y="632" text-anchor="middle" dominant-baseline="middle"
      font-family="'EB Garamond',serif" font-size="15" font-weight="500" fill="#0e1e06">Start!</text>

<!-- 9 ── Q4 BOX ──────────────────────────────
     left=216 top=749 w=228 h=62              -->
<rect x="216" y="749" width="228" height="62"
      fill="#ede2c0" stroke="#1e3a10" stroke-width="2.2"/>
<text text-anchor="middle" font-family="'EB Garamond',serif" font-size="12.5" fill="#1a0e00">
  <tspan x="330" y="774">How can I make it</tspan>
  <tspan x="330" dy="16">easier to start now?</tspan>
</text>
<text x="225" y="765" font-family="'EB Garamond',serif" font-size="9"
      font-style="italic" fill="#8c6820">Q4</text>

<!-- 10 ── Q5 BOX ─────────────────────────────
     left=216 top=879 h=62                    -->
<rect x="216" y="879" width="228" height="62"
      fill="#ede2c0" stroke="#1e3a10" stroke-width="2.2"/>
<text text-anchor="middle" font-family="'EB Garamond',serif" font-size="12.5" fill="#1a0e00">
  <tspan x="330" y="904">When can I start?</tspan>
  <tspan x="330" dy="16">Schedule it</tspan>
</text>
<text x="225" y="895" font-family="'EB Garamond',serif" font-size="9"
      font-style="italic" fill="#8c6820">Q5</text>

<!-- ═══════════════════════════════════════════
     ARROWS
════════════════════════════════════════════ -->

<!-- A ── Start → Q1 -->
<line x1="330" y1="117" x2="330" y2="150"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>

<!-- B ── Q1 No → Q2 -->
<line x1="330" y1="253" x2="330" y2="318"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="337" y="289" font-family="'EB Garamond',serif"
      font-size="12" font-style="italic" fill="#4a6c28">No</text>

<!-- C ── Q1 Yes → Nutella -->
<line x1="481" y1="202" x2="496" y2="202"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="483" y="194" font-family="'EB Garamond',serif"
      font-size="12" font-style="italic" fill="#4a6c28">Yes</text>

<!-- D ── Nutella loop back to Q1 (dashed, goes around outside top)
     right edge of Nutella → far right → across top → far left → Q1 left point -->
<polyline points="646,210 638,210 638,55 22,55 22,202 178,202"
          fill="none" stroke="#4a7c2a" stroke-width="1.6"
          stroke-dasharray="7,4" marker-end="url(#arr2)"/>

<!-- E ── Q2 No → Feet up -->
<line x1="164" y1="372" x2="147" y2="372"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="152" y="364" font-family="'EB Garamond',serif"
      font-size="12" font-style="italic" fill="#4a6c28">No</text>

<!-- F ── Q2 Yes → Todo -->
<line x1="330" y1="425" x2="330" y2="469"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="337" y="451" font-family="'EB Garamond',serif"
      font-size="12" font-style="italic" fill="#4a6c28">Yes</text>

<!-- G ── Todo → Q3 -->
<line x1="330" y1="533" x2="330" y2="578"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>

<!-- H ── Q3 Yes → Start! -->
<line x1="476" y1="632" x2="490" y2="632"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="477" y="624" font-family="'EB Garamond',serif"
      font-size="12" font-style="italic" fill="#4a6c28">Yes</text>

<!-- I ── Q3 No → Q4 -->
<line x1="330" y1="685" x2="330" y2="747"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="337" y="720" font-family="'EB Garamond',serif"
      font-size="12" font-style="italic" fill="#4a6c28">No</text>

<!-- J ── Q4 try again → Q3 left (routes down-left side) -->
<polyline points="216,780 148,780 148,632 183,632"
          fill="none" stroke="#1e3a10" stroke-width="1.6"
          marker-end="url(#arr)"/>
<!-- "try again" label on the horizontal segment -->
<text x="181" y="773" text-anchor="middle"
      font-family="'EB Garamond',serif" font-size="11"
      font-style="italic" fill="#4a6c28">try again</text>

<!-- K ── Q4 not yet → Q5 -->
<line x1="330" y1="811" x2="330" y2="877"
      stroke="#1e3a10" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="337" y="848" font-family="'EB Garamond',serif"
      font-size="12" font-style="italic" fill="#4a6c28">not yet</text>

</svg>

<!-- ── Nutella legend ────────────────────────── -->
<div class="legend">
  <div class="leg-icon">🍫</div>
  <div>
    <div class="leg-kw">The Keyword · "Nutella"</div>
    <div class="leg-lines">
      <span>I love you</span>
      <span>I see that you are struggling</span>
      <span>I just want to help</span>
      <span>Friendly reminder</span>
      <span>Do you want help?</span>
    </div>
  </div>
</div>

</div><!-- /card -->
</body>
</html>
