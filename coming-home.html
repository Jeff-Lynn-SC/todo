<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Home</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: linear-gradient(160deg, #1b3410 0%, #253d14 50%, #182d0e 100%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 2.5rem 1rem 3rem;
}

h1 {
  font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 700;
  color: #e8d888; letter-spacing: 0.1em;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5); margin-bottom: 0.3rem;
}
.sub {
  font-family: 'EB Garamond', serif; font-style: italic;
  font-size: 1rem; color: #7aaa58; letter-spacing: 0.12em; margin-bottom: 2rem;
}

.card {
  width: 100%; max-width: 680px;
  border: 1px solid #4a7c28; outline: 3px solid #2a5010; outline-offset: 3px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5); overflow: hidden;
  transition: opacity 0.4s;
}
.card.dimmed { opacity: 0.55; pointer-events: none; }

svg { display: block; width: 100%; height: auto; }

@keyframes nodeGlow {
  0%, 100% { opacity: 0.7; stroke-width: 4; }
  50%       { opacity: 1;   stroke-width: 5.5; }
}
.hl-shape { animation: nodeGlow 1.5s ease-in-out infinite; }

.legend {
  background: #0e1e08; padding: 1.4rem 1.75rem;
  display: flex; gap: 1.25rem; align-items: flex-start;
  border-top: 1px solid #3a6820;
}
.leg-icon { font-size: 2rem; flex-shrink: 0; line-height: 1; margin-top: 4px; }
.leg-kw { font-family: 'Cinzel', serif; font-size: 0.95rem; color: #e8d888; letter-spacing: 0.06em; margin-bottom: 0.55rem; }
.leg-lines { font-family: 'EB Garamond', serif; font-style: italic; font-size: 1rem; color: #7aaa58; line-height: 1.85; }
.leg-lines span { display: block; padding-left: 0.75rem; border-left: 1.5px solid #3a6820; }

/* ── Begin button ── */
#begin-btn {
  margin-top: 2rem;
  font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.1em;
  color: #e8d888; background: rgba(26,58,16,0.85);
  border: 1.5px solid #4a7c28; border-radius: 4px;
  padding: 0.8rem 2.5rem; cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  transition: background 0.2s, transform 0.1s;
}
#begin-btn:hover { background: rgba(40,80,20,0.95); }
#begin-btn:active { transform: scale(0.97); }

/* ── Walk panel ── */
#walk-panel {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: linear-gradient(0deg, #080e04 0%, rgba(12,22,6,0.97) 100%);
  border-top: 2px solid #4a7c28;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
  padding: 1.1rem 1.4rem max(1.5rem, env(safe-area-inset-bottom, 1.5rem));
}
#walk-panel.active { display: block; }

.walk-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.7rem;
}
#walk-step-label {
  font-family: 'Cinzel', serif; font-size: 0.68rem; color: #7aaa58;
  letter-spacing: 0.14em; text-transform: uppercase;
}
#exit-walk {
  background: none; border: 1px solid #3a6820; color: #7aaa58;
  font-family: 'EB Garamond', serif; font-style: italic; font-size: 0.85rem;
  padding: 0.2rem 0.65rem; cursor: pointer; border-radius: 2px;
}

#walk-text {
  font-family: 'EB Garamond', serif; font-size: 1.3rem;
  color: #e8d888; line-height: 1.35; margin-bottom: 1rem;
}

/* ── Nutella timer ── */
#nutella-timer {
  display: none; text-align: center;
  padding: 0.6rem 0 0.9rem; margin-bottom: 0.8rem;
  border-bottom: 1px solid #2a5010;
}
.timer-wrap {
  display: inline-flex; align-items: center; gap: 1.2rem;
}
.timer-ring-svg {
  width: 80px; height: 80px;
  transform: rotate(-90deg); overflow: visible;
}
#timer-track    { stroke: #1e3a10; fill: none; }
#timer-progress { stroke: #7aaa58; fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
.timer-info { text-align: left; }
#timer-display {
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 1.8rem; color: #e8d888; line-height: 1;
}
#timer-sublabel {
  font-family: 'EB Garamond', serif; font-style: italic;
  font-size: 0.85rem; color: #7aaa58; margin-top: 0.25rem;
}

/* ── Walk buttons ── */
.walk-btn-row { display: flex; gap: 0.7rem; flex-wrap: wrap; }
.walk-btn {
  font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.05em;
  padding: 0.65rem 1.2rem; cursor: pointer; border-radius: 3px;
  border: 1.5px solid #4a7c28; flex: 1; min-width: 80px; text-align: center;
  transition: transform 0.1s, opacity 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.walk-btn:active { transform: scale(0.95); opacity: 0.8; }
.walk-btn-yes  { background: #2a5018; color: #c4e8a0; }
.walk-btn-no   { background: transparent; color: #7aaa58; }
.walk-btn-next { background: #2a5018; color: #c4e8a0; }
.walk-btn-end  { background: #4a7c28; color: #e8d888; border-color: #7aaa58; }
.walk-btn-try  { background: #2a5018; color: #c4e8a0; }
.walk-btn-later{ background: transparent; color: #7aaa58; }

/* ── Nutella overlay ── */
#nutella-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(6,14,3,0.96);
  align-items: center; justify-content: center; padding: 2rem;
}
#nutella-overlay.show { display: flex; }
.nutella-card {
  background: #0e1e08; border: 2px solid #4a7c28; border-radius: 10px;
  padding: 2.5rem 2rem; max-width: 340px; width: 100%; text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
.nutella-emoji { font-size: 3.5rem; margin-bottom: 0.6rem; }
.nutella-word  { font-family: 'Cinzel', serif; font-size: 1.7rem; color: #e8d888; letter-spacing: 0.1em; margin-bottom: 1.2rem; }
.nutella-lines { font-family: 'EB Garamond', serif; font-style: italic; font-size: 1.1rem; color: #7aaa58; line-height: 2; margin-bottom: 1.75rem; }
.nutella-lines span { display: block; }
.nutella-dismiss {
  width: 100%; font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 0.07em;
  background: #2a5018; color: #c4e8a0; border: 1.5px solid #4a7c28;
  border-radius: 3px; padding: 0.8rem 1.5rem; cursor: pointer;
}

@media print {
  body { background: #fff; padding: 0; }
  .card { box-shadow: none; outline: none; }
  h1 { color: #1a1a1a; text-shadow: none; }
  .sub { color: #555; }
  .legend { background: #f5f5f5; }
  .leg-kw { color: #1a1a1a; }
  .leg-lines { color: #333; }
  #begin-btn, #walk-panel, #nutella-overlay { display: none !important; }
}
</style>
</head>

      <span>I just want to help</span>
      <span>Friendly reminder</span>
      <span>Do you want help?</span>
    </div>
    <button class="nutella-dismiss" onclick="dismissNutella()">💚 Thank you — I'm ready</button>
  </div>
</div>

<script>
// ── Node shape data (for drawing the highlight overlay) ──────────────────
const NODES = {
  start:   { type: 'ellipse', cx: 330, cy: 90,  rx: 116, ry: 33,        scrollY: 90  },
  q1:      { type: 'polygon', pts: '330,148 484,202 330,256 176,202',   scrollY: 202 },
  nutella: { type: 'rect',    x: 492, y: 169, w: 160, h: 78, r: 3,     scrollY: 210 },
  q2:      { type: 'polygon', pts: '330,316 499,372 330,428 161,372',   scrollY: 372 },
  feetup:  { type: 'ellipse', cx: 78,  cy: 372, rx: 74,  ry: 33,       scrollY: 372 },
  todo:    { type: 'rect',    x: 214, y: 465, w: 228, h: 68, r: 3,     scrollY: 502 },
  q3:      { type: 'polygon', pts: '330,576 479,632 330,688 181,632',   scrollY: 632 },
  gostart: { type: 'ellipse', cx: 566, cy: 632, rx: 80,  ry: 33,       scrollY: 632 },
  q4:      { type: 'rect',    x: 210, y: 743, w: 240, h: 68, r: 3,     scrollY: 780 },
  q5:      { type: 'rect',    x: 210, y: 873, w: 240, h: 68, r: 3,     scrollY: 910 },
};

// ── Flow definition ──────────────────────────────────────────────────────
const FLOW = {
  start:   { label: 'Welcome',      text: 'I come home',                            type: 'intro',   next: 'q1' },
  q1:      { label: 'Question 1',   text: 'Do I need my space right now?',          type: 'yn',      yes: 'nutella', no: 'q2' },
  nutella: { label: 'Taking space', text: 'Dad will say "Nutella" after 1 hour',    type: 'timer',   next: 'q1' },
  q2:      { label: 'Question 2',   text: 'Do I need to do anything today?',        type: 'yn',      yes: 'todo', no: 'feetup' },
  feetup:  { label: 'All done ☕',  text: 'Put my feet up',                         type: 'end' },
  todo:    { label: 'Action',       text: 'Write it into the ordered to-do list',  type: 'action',  next: 'q3' },
  q3:      { label: 'Question 3',   text: 'Can I start straight away?',            type: 'yn',      yes: 'gostart', no: 'q4' },
  gostart: { label: 'Go! 🌿',       text: 'Start!',                                type: 'end' },
  q4:      { label: 'Question 4',   text: 'How can I make it easier to start now?',type: 'q4',      tryAgain: 'q3', notYet: 'q5' },
  q5:      { label: 'Question 5',   text: 'When can I start? Schedule it',         type: 'schedule' },
};

// ── State ────────────────────────────────────────────────────────────────
const TIMER_SECS = 3600;
const CIRC       = 2 * Math.PI * 40; // r=40 circle circumference
let timerInterval = null;

// ── SVG highlight ────────────────────────────────────────────────────────
function highlightNode(id) {
  const ns = 'http://www.w3.org/2000/svg';
  const hl = document.getElementById('hl-layer');
  hl.innerHTML = '';
  const s = NODES[id];
  if (!s) return;
  let el;
  if (s.type === 'ellipse') {
    el = document.createElementNS(ns, 'ellipse');
    el.setAttribute('cx', s.cx); el.setAttribute('cy', s.cy);
    el.setAttribute('rx', s.rx); el.setAttribute('ry', s.ry);
  } else if (s.type === 'polygon') {
    el = document.createElementNS(ns, 'polygon');
    el.setAttribute('points', s.pts);
  } else {
    el = document.createElementNS(ns, 'rect');
    el.setAttribute('x', s.x); el.setAttribute('y', s.y);
    el.setAttribute('width', s.w); el.setAttribute('height', s.h);
    if (s.r) el.setAttribute('rx', s.r);
  }
  el.setAttribute('fill', 'none');
  el.setAttribute('stroke', '#e8c840');
  el.setAttribute('stroke-width', '4');
  el.setAttribute('filter', 'url(#glow)');
  el.classList.add('hl-shape');
  hl.appendChild(el);
}

function clearHighlight() {
  document.getElementById('hl-layer').innerHTML = '';
}

function scrollToNode(id) {
  const svgEl = document.querySelector('svg');
  if (!svgEl) return;
  const s = NODES[id];
  if (!s) return;
  const scale = svgEl.getBoundingClientRect().width / 660;
  const svgTop = svgEl.getBoundingClientRect().top + window.scrollY;
  const targetY = svgTop + s.scrollY * scale - 140;
  window.scrollTo({ top: Math.max(0, targetY), behavior: 'smooth' });
}

// ── Walk control ─────────────────────────────────────────────────────────
function beginWalk() {
  document.getElementById('begin-btn').style.display = 'none';
  document.getElementById('walk-panel').classList.add('active');
  document.getElementById('chartCard').classList.add('dimmed');
  goStep('start');
}

function exitWalk() {
  stopTimer();
  document.getElementById('begin-btn').style.display = '';
  document.getElementById('walk-panel').classList.remove('active');
  document.getElementById('chartCard').classList.remove('dimmed');
  clearHighlight();
}

function goStep(id) {
  stopTimer();
  const step = FLOW[id];
  document.getElementById('walk-step-label').textContent = step.label;
  document.getElementById('walk-text').textContent = step.text;

  const timerEl = document.getElementById('nutella-timer');
  timerEl.style.display = step.type === 'timer' ? 'block' : 'none';

  highlightNode(id);
  scrollToNode(id);

  const btns = document.getElementById('walk-buttons');
  btns.innerHTML = '';

  if (step.type === 'intro') {
    btn(btns, "I'm home →", 'walk-btn-next', () => goStep(step.next));

  } else if (step.type === 'yn') {
    btn(btns, 'Yes', 'walk-btn-yes', () => goStep(step.yes));
    btn(btns, 'No',  'walk-btn-no',  () => goStep(step.no));

  } else if (step.type === 'timer') {
    startTimer();
    btn(btns, "I'm ready now", 'walk-btn-next', () => goStep(step.next));

  } else if (step.type === 'action') {
    btn(btns, 'Done ✓', 'walk-btn-next', () => goStep(step.next));

  } else if (step.type === 'q4') {
    btn(btns, 'Try again', 'walk-btn-try',   () => goStep(step.tryAgain));
    btn(btns, 'Not yet',   'walk-btn-later', () => goStep(step.notYet));

  } else if (step.type === 'schedule') {
    btn(btns, 'Scheduled ✓', 'walk-btn-end', () => exitWalk());
    btn(btns, 'Start over',  'walk-btn-no',  () => goStep('start'));

  } else if (step.type === 'end') {
    btn(btns, 'Start over', 'walk-btn-end', () => goStep('start'));
  }
}

function btn(container, text, cls, fn) {
  const b = document.createElement('button');
  b.className = 'walk-btn ' + cls;
  b.textContent = text;
  b.onclick = fn;
  container.appendChild(b);
}

// ── Nutella timer ─────────────────────────────────────────────────────────
function startTimer() {
  // Request notification permission inside user gesture
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  const endTime = Date.now() + TIMER_SECS * 1000;
  localStorage.setItem('nutellaEnd', String(endTime));
  tickTimer(endTime);
  timerInterval = setInterval(() => tickTimer(endTime), 1000);
}

function tickTimer(endTime) {
  const remaining = Math.max(0, Math.round((endTime - Date.now()) / 1000));
  const mins = String(Math.floor(remaining / 60)).padStart(2, '0');
  const secs = String(remaining % 60).padStart(2, '0');
  document.getElementById('timer-display').textContent = `${mins}:${secs}`;
  const pct = remaining / TIMER_SECS;
  const offset = CIRC * (1 - pct);
  const prog = document.getElementById('timer-progress');
  prog.style.strokeDasharray = CIRC;
  prog.style.strokeDashoffset = offset;
  // colour shifts red as time runs low
  prog.style.stroke = pct > 0.3 ? '#7aaa58' : pct > 0.1 ? '#c8a840' : '#c84040';
  if (remaining === 0) {
    stopTimer();
    localStorage.removeItem('nutellaEnd');
    triggerNutella();
  }
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function triggerNutella() {
  document.getElementById('nutella-overlay').classList.add('show');
  if ('vibrate' in navigator) navigator.vibrate([400, 200, 400, 200, 600]);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.55, 1.1].forEach(t => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = 528;
      g.gain.setValueAtTime(0, ctx.currentTime + t);
      g.gain.linearRampToValueAtTime(0.28, ctx.currentTime + t + 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.9);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.9);
    });
  } catch(e) {}
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('🍫 Nutella', {
      body: "Dad is checking in — I love you ❤️",
      tag: 'nutella', requireInteraction: true,
    });
  }
}

function dismissNutella() {
  document.getElementById('nutella-overlay').classList.remove('show');
  goStep('q1');
}

// Resume timer if page was reloaded mid-countdown
window.addEventListener('load', () => {
  const saved = localStorage.getItem('nutellaEnd');
  if (!saved) return;
  const endTime = parseInt(saved);
  if (endTime > Date.now()) {
    beginWalk();
    // directly show nutella step and resume ticking
    document.getElementById('walk-step-label').textContent = FLOW.nutella.label;
    document.getElementById('walk-text').textContent = FLOW.nutella.text;
    document.getElementById('nutella-timer').style.display = 'block';
    highlightNode('nutella');
    const btns = document.getElementById('walk-buttons');
    btns.innerHTML = '';
    btn(btns, "I'm ready now", 'walk-btn-next', () => goStep('q1'));
    tickTimer(endTime);
    timerInterval = setInterval(() => tickTimer(endTime), 1000);
  } else {
    localStorage.removeItem('nutellaEnd');
  }
});
</script>
</body>
</html>
