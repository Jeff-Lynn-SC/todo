<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maryam</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%231a1a1a'/><rect x='7' y='9' width='11' height='11' rx='1' fill='none' stroke='%23fffef9' stroke-width='2'/><rect x='10.5' y='12.5' width='4' height='4' fill='%23fffef9'/><line x1='21' y1='13' x2='26' y2='13' stroke='%23fffef9' stroke-width='2' stroke-linecap='round'/><line x1='21' y1='19' x2='26' y2='19' stroke='%23888' stroke-width='2' stroke-linecap='round'/><line x1='7' y1='25' x2='26' y2='25' stroke='%23444' stroke-width='1.5' stroke-linecap='round'/></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f0e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    padding: 2rem;
  }

  .card {
    background: #fffef9;
    border: 2px solid #1a1a1a;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 6px 6px 0 #1a1a1a;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 0.25rem;
    color: #1a1a1a;
  }

  .date {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }

  /* ── rows ── */
  .row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid #e8e4dc;
    position: relative;
  }
  .row:last-child { border-bottom: none; }
  .row.dragging { opacity: 0.35; }
  .row.drag-over { border-top: 2px solid #1a1a1a; }

  /* drag handle */
  .handle {
    cursor: grab;
    color: #d8d4cc;
    font-size: 0.95rem;
    padding: 0.75rem 0.5rem 0.75rem 0;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    line-height: 1;
  }
  .handle:hover { color: #999; }
  .handle:active { cursor: grabbing; }

  /* task item */
  .item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 0;
    cursor: pointer;
    transition: opacity 0.2s;
    flex: 1;
    min-width: 0;
  }
  .item:hover { opacity: 0.7; }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid #1a1a1a;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .item.done .checkbox { background: #1a1a1a; }
  .item.done .checkbox::after {
    content: '✓';
    color: #fffef9;
    font-size: 12px;
    font-weight: bold;
  }

  .label {
    font-size: 0.9rem;
    letter-spacing: 0.03em;
    color: #1a1a1a;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item.done .label { text-decoration: line-through; color: #aaa; }

  /* inline rename inputs */
  .label-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.03em;
    color: #1a1a1a;
    border: none;
    border-bottom: 1px solid #1a1a1a;
    background: transparent;
    outline: none;
    flex: 1;
    min-width: 0;
    padding: 0;
  }

  /* delete button (appears on row hover) */
  .del {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    color: #ddd;
    cursor: pointer;
    padding: 0.75rem 0 0.75rem 0.5rem;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .row:hover .del { opacity: 1; }
  .del:hover { color: #c0392b !important; }

  /* section header row */
  .header-row {
    display: flex;
    align-items: center;
    margin-top: 1.25rem;
    padding-top: 0.75rem;
    border-top: 1px solid #d8d4cc;
    position: relative;
  }
  .header-row.first-section { margin-top: 0; padding-top: 0; border-top: none; }
  .header-row.dragging { opacity: 0.35; }

  .header {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    color: #999;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.25rem 0;
    flex: 1;
    min-width: 0;
  }

  .header-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999;
    border: none;
    background: transparent;
    outline: none;
    flex: 1;
    min-width: 0;
    padding: 0.25rem 0;
  }

  /* add-item row */
  .add-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 0 0;
    margin-top: 0.5rem;
    border-top: 1px dashed #d8d4cc;
  }
  .add-plus {
    color: #ccc;
    font-size: 0.85rem;
    flex-shrink: 0;
    user-select: none;
  }
  .add-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    color: #1a1a1a;
    border: none;
    background: transparent;
    outline: none;
    flex: 1;
    min-width: 0;
  }
  .add-input::placeholder { color: #ccc; }
  .add-header-btn {
    background: none;
    border: 1px solid #ddd;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: #bbb;
    cursor: pointer;
    padding: 0.2rem 0.45rem;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .add-header-btn:hover { border-color: #999; color: #777; }

  /* ── PAT modal ── */
  #pat-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(245,240,232,0.92);
    align-items: center; justify-content: center; z-index: 9999;
  }
  #pat-box {
    background: #fffef9; border: 2px solid #1a1a1a;
    box-shadow: 6px 6px 0 #1a1a1a; padding: 2rem;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  #pat-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  #pat-msg { font-size: 0.72rem; color: #c0392b; min-height: 1em; }
  #pat-input {
    font-family: 'DM Mono', monospace; font-size: 0.82rem;
    border: 2px solid #1a1a1a; background: #f5f0e8;
    padding: 0.5rem 0.65rem; outline: none; width: 100%;
  }
  #pat-hint { font-size: 0.65rem; color: #999; }
  #pat-save {
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    background: #1a1a1a; color: #fffef9; border: none;
    padding: 0.55rem 1.2rem; cursor: pointer; align-self: flex-start;
  }
  #pat-save:hover { background: #333; }

  /* hint text */
  .hint {
    font-size: 0.65rem;
    color: #ccc;
    letter-spacing: 0.04em;
    margin-top: 0.35rem;
  }

  /* progress */
  .progress {
    margin-top: 1.75rem;
    font-size: 0.7rem;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .bar {
    height: 3px;
    background: #e8e4dc;
    margin-top: 0.5rem;
  }
  .bar-fill {
    height: 100%;
    background: #1a1a1a;
    transition: width 0.3s ease;
  }

</style>
</head>
<body>
<div id="pat-modal">
  <div id="pat-box">
    <div id="pat-title">GitHub Token</div>
    <div id="pat-msg"></div>
    <input id="pat-input" type="password" placeholder="ghp_…" autocomplete="off" spellcheck="false" />
    <div id="pat-hint">Create a token with <b>repo</b> scope at github.com/settings/tokens — set expiry to <b>No expiration</b></div>
    <button id="pat-save">Save token</button>
  </div>
</div>
<div class="card">
  <h1>Maryam</h1>
  <div class="date" id="dateLabel"></div>

  <div id="list"></div>

  <div class="add-row">
    <span class="add-plus">+</span>
    <input class="add-input" id="addInput" placeholder="add item…" autocomplete="off" />
    <button class="add-header-btn" id="addHeaderBtn" title="Add as section header">+ header</button>
  </div>
  <div class="hint">press enter to add · double-click any item to rename</div>

  <div class="progress">
    <span id="progressText">0 / 0 done</span>
    <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  </div>
</div>

<script>
  const REPO    = 'Jeff-Lynn-SC/todo';
  const FILE    = 'maryam-tasks.json';
  const API_URL = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

  const defaults = [];

  let tasks   = [];
  let fileSha = null;

  function getPat() { return localStorage.getItem('gh_pat'); }

  function showPatModal(msg) {
    document.getElementById('pat-modal').style.display = 'flex';
    document.getElementById('pat-msg').textContent = msg || '';
    setTimeout(() => document.getElementById('pat-input').focus(), 0);
  }

  async function load() {
    const pat = getPat();
    if (!pat) { showPatModal(); return; }
    try {
      const res = await fetch(API_URL, {
        headers: { Authorization: `token ${pat}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (res.status === 401) { localStorage.removeItem('gh_pat'); showPatModal('Token rejected — please re-enter.'); return; }
      if (res.ok) {
        const meta = await res.json();
        fileSha = meta.sha;
        const data = JSON.parse(atob(meta.content.replace(/\n/g, '')));
        tasks = Array.isArray(data) && data.length ? data : defaults;
      } else {
        tasks = defaults;
      }
    } catch(e) {
      tasks = defaults;
    }
    render();
  }

  function save() {
    const pat = getPat();
    if (!pat) { showPatModal(); return; }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(tasks))));
    const body    = { message: 'update tasks', content };
    if (fileSha) body.sha = fileSha;
    fetch(API_URL, {
      method:  'PUT',
      headers: { Authorization: `token ${pat}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    }).then(r => r.ok ? r.json() : null)
      .then(d => { if (d && d.content) fileSha = d.content.sha; })
      .catch(() => {});
  }

const list        = document.getElementById('list');
  const progressText = document.getElementById('progressText');
  const barFill     = document.getElementById('barFill');
  const dateLabel   = document.getElementById('dateLabel');
  const addInput    = document.getElementById('addInput');
  const addHeaderBtn = document.getElementById('addHeaderBtn');

  dateLabel.textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long'
  });

  // ── drag state ──────────────────────────────────────────────────────────
  let dragSrcIndex = null;

  // ── touch drag state (iOS) ───────────────────────────────────────────────
  let touchSrc = null;
  let touchDragging = false;

  // Suppress page scroll while a drag is in progress (must be on document, non-passive)
  document.addEventListener('touchmove', e => {
    if (touchDragging) e.preventDefault();
  }, { passive: false });

  function attachTouchDrag(triggerEl, rowEl, idx) {
    triggerEl.addEventListener('touchstart', e => {
      e.preventDefault();
      touchSrc = idx;
      touchDragging = true;
      setTimeout(() => rowEl.classList.add('dragging'), 0);
    }, { passive: false });

    triggerEl.addEventListener('touchmove', e => {
      if (!touchDragging) return;
      const touch = e.touches[0];
      // Use bounding rects — more reliable on iOS than elementFromPoint
      let targetRow = null;
      list.querySelectorAll('[data-task-index]').forEach(r => {
        if (r === rowEl) return;
        const rect = r.getBoundingClientRect();
        if (touch.clientY >= rect.top && touch.clientY <= rect.bottom) targetRow = r;
      });
      list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (targetRow) targetRow.classList.add('drag-over');
    }, { passive: false });

    function onTouchEnd() {
      if (!touchDragging) return;
      touchDragging = false;
      rowEl.classList.remove('dragging');
      const overEl = list.querySelector('.drag-over');
      list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (overEl) {
        const targetIdx = parseInt(overEl.dataset.taskIndex);
        if (!isNaN(targetIdx) && targetIdx !== touchSrc) {
          const moved = tasks.splice(touchSrc, 1)[0];
          const insertAt = touchSrc < targetIdx ? targetIdx - 1 : targetIdx;
          tasks.splice(insertAt, 0, moved);
          save();
          render();
        }
      }
      touchSrc = null;
    }

    triggerEl.addEventListener('touchend', onTouchEnd, { passive: true });
    triggerEl.addEventListener('touchcancel', onTouchEnd, { passive: true });
  }

  // ── inline rename ────────────────────────────────────────────────────────
  function startRename(i, labelEl, isHeader) {
    const inp = document.createElement('input');
    inp.className = isHeader ? 'header-input' : 'label-input';
    inp.value = tasks[i].label;
    labelEl.replaceWith(inp);
    inp.focus();
    inp.select();

    function commit() {
      const v = inp.value.trim();
      if (v) tasks[i].label = v;
      save();
      render();
    }

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
      if (e.key === 'Escape') { render(); } // cancel without saving
    });
  }

  // ── render ───────────────────────────────────────────────────────────────
  function render() {
    list.innerHTML = '';

    const firstHeaderIndex = tasks.findIndex(t => t.header === true);

    tasks.forEach((t, i) => {
      const isHeader = t.header === true;
      const row = document.createElement('div');
      row.className = isHeader
        ? 'header-row' + (i === firstHeaderIndex ? ' first-section' : '')
        : 'row';
      row.draggable = true;
      row.dataset.taskIndex = i;

      // drag handle
      const handle = document.createElement('span');
      handle.className = 'handle';
      handle.textContent = '⠿';
      handle.title = 'Drag to reorder';
      row.appendChild(handle);
      attachTouchDrag(handle, row, i);

      if (isHeader) {
        const h = document.createElement('div');
        h.className = 'header';
        h.textContent = t.label;
        h.title = 'Double-click to rename';
        h.addEventListener('dblclick', e => { e.stopPropagation(); startRename(i, h, true); });
        row.appendChild(h);
      } else {
        const item = document.createElement('div');
        item.className = 'item' + (t.done ? ' done' : '');

        const cb = document.createElement('div');
        cb.className = 'checkbox';
        cb.addEventListener('click', e => {
          e.stopPropagation();
          tasks[i].done = !tasks[i].done;
          save();
          render();
        });
        item.appendChild(cb);

        const lbl = document.createElement('span');
        lbl.className = 'label';
        lbl.textContent = t.label;
        lbl.title = 'Double-click to rename';
        lbl.addEventListener('dblclick', e => {
          e.stopPropagation();
          startRename(i, lbl, false);
        });
        item.appendChild(lbl);

        row.appendChild(item);
      }

      // delete button (shown on hover via CSS)
      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.title = 'Delete';
      del.addEventListener('click', e => {
        e.stopPropagation();
        tasks.splice(i, 1);
        save();
        render();
      });
      row.appendChild(del);

      // ── drag-and-drop events ──
      row.addEventListener('dragstart', e => {
        dragSrcIndex = i;
        setTimeout(() => row.classList.add('dragging'), 0);
        e.dataTransfer.effectAllowed = 'move';
      });

      row.addEventListener('dragend', () => {
        row.classList.remove('dragging');
        list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      });

      row.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        if (dragSrcIndex !== i) row.classList.add('drag-over');
      });

      row.addEventListener('dragleave', () => {
        row.classList.remove('drag-over');
      });

      row.addEventListener('drop', e => {
        e.preventDefault();
        row.classList.remove('drag-over');
        if (dragSrcIndex === null || dragSrcIndex === i) return;
        const moved = tasks.splice(dragSrcIndex, 1)[0];
        // adjust target index after removal
        const insertAt = dragSrcIndex < i ? i - 1 : i;
        tasks.splice(insertAt, 0, moved);
        dragSrcIndex = null;
        save();
        render();
      });

      list.appendChild(row);
    });

    // progress
    const items = tasks.filter(t => !t.header);
    const done  = items.filter(t => t.done).length;
    progressText.textContent = `${done} / ${items.length} done`;
    barFill.style.width = items.length ? (done / items.length * 100) + '%' : '0%';
  }

  // ── add item ─────────────────────────────────────────────────────────────
  function addItem(asHeader) {
    const val = addInput.value.trim();
    if (!val && !asHeader) return;
    tasks.push(asHeader ? { label: val || 'New Section', header: true } : { label: val, done: false });
    addInput.value = '';
    save();
    render();
    addInput.focus();
  }

  addInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem(false);
  });

  addHeaderBtn.addEventListener('click', () => addItem(true));

  document.getElementById('pat-save').addEventListener('click', () => {
    const v = document.getElementById('pat-input').value.trim();
    if (!v) return;
    localStorage.setItem('gh_pat', v);
    document.getElementById('pat-modal').style.display = 'none';
    load();
  });
  document.getElementById('pat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('pat-save').click();
  });

  load();
</script>
</body>
</html>
