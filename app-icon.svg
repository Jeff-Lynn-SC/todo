<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#d8edda"/>
      <stop offset="100%" stop-color="#f5e8d5"/>
    </linearGradient>
    <linearGradient id="mug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#243b2c"/>
      <stop offset="100%" stop-color="#1a2e20"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Steam wisps -->
  <path d="M 78 90 C 71 74 85 62 78 46"
        fill="none" stroke="#4a7c59" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M 96 86 C 89 70 103 58 96 42"
        fill="none" stroke="#4a7c59" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M 114 90 C 107 74 121 62 114 46"
        fill="none" stroke="#4a7c59" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Handle (drawn first so cup body sits on top at join) -->
  <path d="M 133 113 Q 162 113 162 129 Q 162 147 133 147"
        fill="none" stroke="url(#mug)" stroke-width="13" stroke-linecap="round"/>

  <!-- Cup body -->
  <path d="M 56 100 L 136 100 L 128 156 Q 127 162 121 162 L 71 162 Q 65 162 64 156 Z"
        fill="url(#mug)"/>

  <!-- Cup rim -->
  <rect x="52" y="94" width="88" height="14" rx="7" fill="url(#mug)"/>

  <!-- Liquid surface — hint of tea -->
  <ellipse cx="96" cy="103" rx="38" ry="5.5" fill="#4a7c59" opacity="0.55"/>

  <!-- Subtle rim highlight -->
  <rect x="52" y="94" width="88" height="14" rx="7"
        fill="none" stroke="#3a6248" stroke-width="1.5" opacity="0.4"/>
</svg>
