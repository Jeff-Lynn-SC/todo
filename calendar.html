<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%231a1a1a'/><text x='16' y='22' text-anchor='middle' font-size='16' fill='%23fffef9' font-family='Georgia,serif' font-weight='bold'>31</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f0e8;
    min-height: 100vh;
    font-family: 'DM Mono', monospace;
    padding: 2rem;
  }

  .page { max-width: 1160px; margin: 0 auto; }

  /* ── outer card ── */
  .cal-card {
    background: #fffef9;
    border: 2px solid #1a1a1a;
    box-shadow: 6px 6px 0 #1a1a1a;
    padding: 2rem 2rem 1.5rem;
  }

  /* ── header ── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .cal-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: #1a1a1a;
  }
  .nav-group { display: flex; gap: 0.5rem; }
  .nav-btn {
    background: none;
    border: 2px solid #1a1a1a;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    padding: 0.35rem 0.8rem;
    color: #1a1a1a;
    letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: #1a1a1a; color: #fffef9; }

  /* ── calendar body ── */
  .cal-body {
    border-top: 1.5px solid #1a1a1a;
    border-left: 1.5px solid #1a1a1a;
  }

  /* day-of-week header row */
  .headers-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .day-header {
    border-right: 1.5px solid #1a1a1a;
    border-bottom: 1.5px solid #1a1a1a;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: #888;
    background: #f5f0e8;
    user-select: none;
  }

  /* ── week rows ── */
  .week-row { position: relative; }

  /* ── span bars layer (sits above day cells) ── */
  .spans-layer {
    position: relative;
    overflow: hidden;
    /* height set by JS based on how many rows of spans */
  }
  /* subtle separator only when spans are present */
  .spans-layer.has-spans {
    border-bottom: 1px solid #e8e4dc;
  }

  /* a multi-day span bar */
  .span-bar {
    position: absolute;
    height: 20px;
    background: #1a1a1a;
    color: #fffef9;
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    padding: 0 6px 0 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }
  /* rounded right cap if span continues to next week */
  .span-bar.continues-left  { border-left:  none; }
  .span-bar.continues-right { border-right: none; }

  .span-label { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .del-span {
    color: transparent;
    font-size: 0.85rem;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    transition: color 0.1s;
  }
  .span-bar:hover { background: #333; }
  .span-bar:hover .del-span { color: rgba(255,255,255,0.45); }
  .span-bar:hover .del-span:hover { color: #ff9999; }

  /* drag preview bar */
  .span-bar.preview { background: #888; pointer-events: none; }

  /* ── days grid ── */
  .days-layer {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  /* ── day cells ── */
  .day-cell {
    border-right: 1.5px solid #1a1a1a;
    border-bottom: 1.5px solid #1a1a1a;
    min-height: 108px;
    padding: 0.4rem 0.5rem 0.5rem;
    position: relative;
    cursor: pointer;
    user-select: none;
    transition: background 0.08s;
  }
  .day-cell:hover { background: #fdfcf6; }
  .day-cell.empty { background: #f5f0e8; cursor: default; }
  .day-cell.empty:hover { background: #f5f0e8; }
  .day-cell.selecting { background: #e8e4dc; }

  /* today: inverted square around the day number */
  .day-cell.today .day-num {
    background: #1a1a1a;
    color: #fffef9;
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .day-num {
    font-size: 0.75rem;
    color: #1a1a1a;
    display: inline-block;
    margin-bottom: 0.3rem;
    line-height: 1;
    min-width: 22px;
    text-align: center;
  }

  /* ── single-day event chips ── */
  .events-list { display: flex; flex-direction: column; gap: 2px; }
  .event-chip {
    font-size: 0.66rem;
    color: #1a1a1a;
    background: #edeae3;
    padding: 2px 5px;
    display: flex;
    align-items: center;
    gap: 3px;
    line-height: 1.4;
    cursor: default;
    transition: background 0.08s;
  }
  .event-chip:hover { background: #e4e0d8; }
  .event-text {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .del-event {
    color: transparent;
    font-size: 0.8rem;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
  }
  .event-chip:hover .del-event { color: #ccc; }
  .event-chip:hover .del-event:hover { color: #c0392b; }

  /* inline add-event input */
  .add-event-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.66rem;
    width: 100%;
    border: none;
    border-bottom: 1px solid #1a1a1a;
    background: transparent;
    outline: none;
    color: #1a1a1a;
    padding: 2px 0;
    margin-top: 3px;
    letter-spacing: 0.01em;
  }
  .add-event-input::placeholder { color: #bbb; }

  /* ── span label prompt (floating) ── */
  .span-prompt {
    position: fixed;
    background: #fffef9;
    border: 2px solid #1a1a1a;
    box-shadow: 4px 4px 0 #1a1a1a;
    padding: 0.65rem 0.9rem;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.7rem;
    color: #888;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .span-prompt-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    border: none;
    border-bottom: 1px solid #1a1a1a;
    background: transparent;
    outline: none;
    color: #1a1a1a;
    padding: 1px 0;
    min-width: 200px;
  }
  .span-prompt-input::placeholder { color: #bbb; }

  /* ── hint ── */
  .hint-bar {
    margin-top: 1rem;
    font-size: 0.64rem;
    color: #ccc;
    letter-spacing: 0.04em;
    text-align: right;
  }

  /* ── mobile: horizontal scroll so cells stay a readable size ── */
  .cal-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    /* negative margin so scroll shadow bleeds to card edge */
    margin: 0 -0.25rem;
    padding: 0 0.25rem;
  }
  .cal-body { min-width: 560px; }

  @media (max-width: 600px) {
    body { padding: 1rem 0.75rem; }
    .cal-card { padding: 1.25rem 1rem 1rem; }
    .cal-title { font-size: 1.8rem; }
    .nav-btn { font-size: 0.68rem; padding: 0.3rem 0.55rem; }
  }

  /* ── print ── */
  @media print {
    /* force background colours through (Chrome/Safari) */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    body { background: #fff !important; padding: 0 !important; }
    .page { max-width: 100% !important; }

    /* strip card shadow & padding */
    .cal-card { box-shadow: none !important; border: none !important; padding: 0 !important; }

    /* hide interactive chrome */
    .nav-group, .hint-bar, .del-event, .del-span, .span-prompt { display: none !important; }

    /* span bars: black border + black text on white — readable on any printer */
    .span-bar {
      background: #fff !important;
      color: #000 !important;
      border: 1.5px solid #000 !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    .span-bar:hover { background: #fff !important; }

    /* keep event chips legible */
    .event-chip { background: #eee !important; color: #000 !important; }

    /* ensure page breaks between months if ever needed */
    .week-row { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="cal-card">
    <div class="cal-header">
      <div class="nav-group">
        <button class="nav-btn" id="prevBtn">← prev</button>
        <button class="nav-btn" id="todayBtn">today</button>
        <button class="nav-btn" id="nextBtn">next →</button>
      </div>
      <div class="cal-title" id="calTitle"></div>
    </div>
    <div class="cal-scroll">
      <div class="cal-body" id="calBody"></div>
    </div>
    <div class="hint-bar">click a day to add event · drag across days to mark a multi-day event · hover × to delete</div>
  </div>
</div>

<script>
  const DB     = 'https://todo-e6d14-default-rtdb.europe-west1.firebasedatabase.app/calendar.json';
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July',
                  'August','September','October','November','December'];

  const BAR_H   = 20;  // px height of each span bar
  const BAR_GAP = 3;   // px gap between stacked bars

  let viewYear  = new Date().getFullYear();
  let viewMonth = new Date().getMonth();

  // store.days  = { "2026-03-15": ["Dentist 2pm", "Walk"] }
  // store.spans = [ { label: "Visitor", start: "2026-03-15", end: "2026-03-18" } ]
  let store = { days: {}, spans: [] };

  // ── Firebase ────────────────────────────────────────────────────────────

  async function load() {
    try {
      const res = await fetch(DB);
      const d   = await res.json();
      if (d && typeof d === 'object' && !Array.isArray(d)) store = d;
    } catch(e) {}
    if (!store.days)  store.days  = {};
    if (!store.spans) store.spans = [];
    render();
  }

  function save() {
    fetch(DB, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(store)
    });
  }

  // ── date helpers ─────────────────────────────────────────────────────────

  function dateKey(y, m, d) {
    return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }

  // ── drag state ────────────────────────────────────────────────────────────

  let dragStartKey  = null;
  let dragEndKey    = null;
  let isDragging    = false;
  let hasCrossedDay = false;  // true once pointer moved to a different cell

  document.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;

    const start = dragStartKey;
    const end   = dragEndKey || dragStartKey;
    dragStartKey = dragEndKey = null;
    clearSelect();
    removePreviewBars();

    if (!start) return;

    const s  = start <= end ? start : end;
    const e2 = start <= end ? end   : start;

    if (!hasCrossedDay) {
      // plain click → inline single-day add
      const cell = document.querySelector(`[data-key="${s}"]`);
      if (cell) openInlineAdd(cell, s);
    } else {
      // drag across days → multi-day span
      showSpanPrompt(s, e2, e.clientX, e.clientY);
    }
    hasCrossedDay = false;
  });

  function clearSelect() {
    document.querySelectorAll('.day-cell.selecting')
      .forEach(c => c.classList.remove('selecting'));
  }

  function removePreviewBars() {
    document.querySelectorAll('.span-bar.preview').forEach(b => b.remove());
  }

  // ── render ────────────────────────────────────────────────────────────────

  function render() {
    document.getElementById('calTitle').textContent =
      `${MONTHS[viewMonth]} ${viewYear}`;

    const body = document.getElementById('calBody');
    body.innerHTML = '';

    // Day-of-week headers
    const hRow = document.createElement('div');
    hRow.className = 'headers-row';
    DAYS.forEach(name => {
      const h = document.createElement('div');
      h.className   = 'day-header';
      h.textContent = name;
      hRow.appendChild(h);
    });
    body.appendChild(hRow);

    const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const today       = new Date();

    // Build flat cells array (null = empty padding day)
    const cells = [];
    for (let i = 0; i < firstDay; i++)     cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0)         cells.push(null);

    // Render week rows
    for (let wi = 0; wi < cells.length; wi += 7) {
      const week    = cells.slice(wi, wi + 7);
      const weekRow = document.createElement('div');
      weekRow.className = 'week-row';
      weekRow.appendChild(buildSpansLayer(week));
      weekRow.appendChild(buildDaysLayer(week, today));
      body.appendChild(weekRow);
    }
  }

  // ── spans layer ──────────────────────────────────────────────────────────

  function buildSpansLayer(week) {
    const layer   = document.createElement('div');
    layer.className = 'spans-layer';
    layer.dataset.week = week.filter(Boolean).join(',');

    const nonNull     = week.filter(d => d !== null);
    if (!nonNull.length) return layer;

    const weekFirstKey = dateKey(viewYear, viewMonth, nonNull[0]);
    const weekLastKey  = dateKey(viewYear, viewMonth, nonNull[nonNull.length - 1]);

    const spansHere = (store.spans || []).filter(sp =>
      sp.start <= weekLastKey && sp.end >= weekFirstKey
    );
    if (!spansHere.length) return layer;

    layer.classList.add('has-spans');

    // Map each span to column positions for this week
    const spansWithCols = spansHere.map(sp => {
      const visStart = sp.start < weekFirstKey ? weekFirstKey : sp.start;
      const visEnd   = sp.end   > weekLastKey  ? weekLastKey  : sp.end;
      const vsDay    = parseInt(visStart.split('-')[2]);
      const veDay    = parseInt(visEnd.split('-')[2]);
      const startCol = week.indexOf(vsDay);
      const endCol   = week.indexOf(veDay);
      const continuesLeft  = sp.start < weekFirstKey;
      const continuesRight = sp.end   > weekLastKey;
      return { sp, startCol, endCol, continuesLeft, continuesRight };
    }).filter(x => x.startCol !== -1 && x.endCol !== -1)
      .sort((a, b) => a.startCol - b.startCol);

    // Greedy interval scheduling to avoid overlapping bars
    const rowEnds = [];
    spansWithCols.forEach(({ sp, startCol, endCol, continuesLeft, continuesRight }) => {
      let row = rowEnds.findIndex(last => last < startCol);
      if (row === -1) { row = rowEnds.length; }
      rowEnds[row] = endCol;

      const bar = makeSpanBar(sp, startCol, endCol, row, continuesLeft, continuesRight);
      layer.appendChild(bar);
    });

    layer.style.minHeight = `${rowEnds.length * (BAR_H + BAR_GAP) + BAR_GAP}px`;
    return layer;
  }

  function makeSpanBar(sp, startCol, endCol, row, continuesLeft, continuesRight, isPreview) {
    const bar = document.createElement('div');
    bar.className = 'span-bar' + (isPreview ? ' preview' : '');
    if (continuesLeft)  bar.classList.add('continues-left');
    if (continuesRight) bar.classList.add('continues-right');

    bar.style.left   = `calc(${startCol} / 7 * 100% + 2px)`;
    bar.style.width  = `calc(${endCol - startCol + 1} / 7 * 100% - 4px)`;
    bar.style.top    = `${row * (BAR_H + BAR_GAP) + BAR_GAP}px`;
    bar.style.height = `${BAR_H}px`;

    const lbl = document.createElement('span');
    lbl.className   = 'span-label';
    lbl.textContent = sp.label;
    bar.appendChild(lbl);

    if (!isPreview) {
      const del = document.createElement('span');
      del.className   = 'del-span';
      del.textContent = '×';
      del.title       = 'Remove span';
      del.addEventListener('click', e => {
        e.stopPropagation();
        store.spans = store.spans.filter(s => s !== sp);
        save();
        render();
      });
      bar.appendChild(del);
    }

    return bar;
  }

  // ── days layer ────────────────────────────────────────────────────────────

  function buildDaysLayer(week, today) {
    const layer   = document.createElement('div');
    layer.className = 'days-layer';

    week.forEach(d => {
      const k       = d !== null ? dateKey(viewYear, viewMonth, d) : null;
      const isToday = d !== null
        && today.getFullYear() === viewYear
        && today.getMonth()    === viewMonth
        && today.getDate()     === d;

      const cell = document.createElement('div');
      cell.className = 'day-cell'
        + (d === null ? ' empty' : '')
        + (isToday    ? ' today' : '');

      if (d !== null) {
        cell.dataset.key = k;

        const numEl = document.createElement('div');
        numEl.className   = 'day-num';
        numEl.textContent = d;
        cell.appendChild(numEl);

        const list = document.createElement('div');
        list.className = 'events-list';
        (store.days[k] || []).forEach((ev, ei) => {
          list.appendChild(makeEventChip(ev, k, ei));
        });
        cell.appendChild(list);

        // ── mouse drag interaction ──
        cell.addEventListener('mousedown', e => {
          if (e.button !== 0) return;
          e.preventDefault();
          isDragging    = true;
          hasCrossedDay = false;
          dragStartKey  = k;
          dragEndKey    = k;
          cell.classList.add('selecting');
        });

        cell.addEventListener('mouseover', () => {
          if (!isDragging || dragEndKey === k) return;
          hasCrossedDay = true;
          dragEndKey = k;

          // highlight range
          const s  = dragStartKey <= k ? dragStartKey : k;
          const e2 = dragStartKey <= k ? k : dragStartKey;
          document.querySelectorAll('[data-key]').forEach(c => {
            c.classList.toggle('selecting',
              c.dataset.key >= s && c.dataset.key <= e2);
          });

          // show preview bars in spans layers
          removePreviewBars();
          renderPreview(s, e2);
        });
      }

      layer.appendChild(cell);
    });

    return layer;
  }

  // ── preview bars during drag ──────────────────────────────────────────────

  function renderPreview(startKey, endKey) {
    // Find all week spans-layers and add preview bars where the range intersects
    document.querySelectorAll('.spans-layer').forEach(layer => {
      const weekDays = (layer.dataset.week || '').split(',').map(Number).filter(Boolean);
      if (!weekDays.length) return;

      const weekFirstKey = dateKey(viewYear, viewMonth, weekDays[0]);
      const weekLastKey  = dateKey(viewYear, viewMonth, weekDays[weekDays.length - 1]);

      if (startKey > weekLastKey || endKey < weekFirstKey) return;

      const visStart = startKey < weekFirstKey ? weekFirstKey : startKey;
      const visEnd   = endKey   > weekLastKey  ? weekLastKey  : endKey;

      const week = buildWeekArray(weekDays);
      const vsDay = parseInt(visStart.split('-')[2]);
      const veDay = parseInt(visEnd.split('-')[2]);
      const sc = week.indexOf(vsDay);
      const ec = week.indexOf(veDay);
      if (sc === -1 || ec === -1) return;

      // Find lowest available row
      const existing = layer.querySelectorAll('.span-bar:not(.preview)');
      const row = existing.length; // just stack below existing (rough preview)

      const bar = makeSpanBar({ label: '…' }, sc, ec, row,
        startKey < weekFirstKey, endKey > weekLastKey, true);
      layer.classList.add('has-spans');
      const needed = (row + 1) * (BAR_H + BAR_GAP) + BAR_GAP;
      if (parseFloat(layer.style.minHeight || 0) < needed) {
        layer.style.minHeight = `${needed}px`;
      }
      layer.appendChild(bar);
    });
  }

  function buildWeekArray(nonNullDays) {
    // Reconstruct a 7-element week array from non-null days
    // We know it starts on a Sunday-aligned week
    if (!nonNullDays.length) return Array(7).fill(null);
    const firstDay = new Date(viewYear, viewMonth, nonNullDays[0]).getDay();
    const week = Array(7).fill(null);
    nonNullDays.forEach(d => {
      const dow = new Date(viewYear, viewMonth, d).getDay();
      week[dow] = d;
    });
    return week;
  }

  // ── event chip ────────────────────────────────────────────────────────────

  function makeEventChip(ev, k, ei) {
    const chip = document.createElement('div');
    chip.className = 'event-chip';

    const txt = document.createElement('span');
    txt.className   = 'event-text';
    txt.textContent = ev;
    chip.appendChild(txt);

    const del = document.createElement('span');
    del.className   = 'del-event';
    del.textContent = '×';
    del.addEventListener('click', e => {
      e.stopPropagation();
      store.days[k].splice(ei, 1);
      if (!store.days[k].length) delete store.days[k];
      save();
      render();
    });
    chip.appendChild(del);
    return chip;
  }

  // ── inline single-day add ─────────────────────────────────────────────────

  function openInlineAdd(cell, k) {
    if (cell.querySelector('.add-event-input')) return;
    const list = cell.querySelector('.events-list');
    if (!list) return;

    const inp = document.createElement('input');
    inp.className    = 'add-event-input';
    inp.placeholder  = 'add event…';
    inp.autocomplete = 'off';
    inp.addEventListener('mousedown', e => e.stopPropagation());

    function commit() {
      const v = inp.value.trim();
      if (v) {
        if (!store.days[k]) store.days[k] = [];
        store.days[k].push(v);
        save();
      }
      render();
    }

    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { render(); }
    });
    inp.addEventListener('blur', commit);

    list.appendChild(inp);
    setTimeout(() => inp.focus(), 0);
  }

  // ── span name prompt ──────────────────────────────────────────────────────

  let promptEl = null;

  function showSpanPrompt(startKey, endKey, cx, cy) {
    removePrompt();

    const fmt = k => {
      const parts = k.split('-');
      return `${parseInt(parts[2])} ${MONTHS[parseInt(parts[1]) - 1].slice(0, 3)}`;
    };

    const prompt = document.createElement('div');
    prompt.className = 'span-prompt';

    const lbl = document.createElement('span');
    lbl.textContent = `${fmt(startKey)} → ${fmt(endKey)}:`;
    prompt.appendChild(lbl);

    const inp = document.createElement('input');
    inp.className    = 'span-prompt-input';
    inp.placeholder  = 'e.g. Visitor stays · Conference';
    inp.autocomplete = 'off';

    let committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      removePrompt();
      const v = inp.value.trim();
      if (v) {
        store.spans.push({ label: v, start: startKey, end: endKey });
        save();
      }
      render();
    }

    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { committed = true; removePrompt(); render(); }
    });
    inp.addEventListener('blur', () => setTimeout(commit, 120));

    prompt.appendChild(inp);

    // Position near cursor, keep on screen
    const PW = 380, PH = 52;
    let left = cx + 12;
    let top  = cy + 12;
    if (left + PW > window.innerWidth  - 16) left = cx - PW - 12;
    if (top  + PH > window.innerHeight - 16) top  = cy - PH - 12;
    prompt.style.left = `${Math.max(8, left)}px`;
    prompt.style.top  = `${Math.max(8, top)}px`;

    document.body.appendChild(prompt);
    promptEl = prompt;
    setTimeout(() => inp.focus(), 0);
  }

  function removePrompt() {
    if (promptEl) { promptEl.remove(); promptEl = null; }
  }

  document.addEventListener('mousedown', e => {
    if (promptEl && !promptEl.contains(e.target)) {
      removePrompt();
    }
  });

  // ── navigation ────────────────────────────────────────────────────────────

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (--viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (++viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    const n = new Date();
    viewYear = n.getFullYear(); viewMonth = n.getMonth();
    render();
  });

  load();
</script>
</body>
</html>
