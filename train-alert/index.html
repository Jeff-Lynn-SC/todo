<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Train Alert">
  <title>Train Station Alert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 28px;
      text-align: center;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
      border: 1px solid #0f3460;
    }

    .card h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7ec8e3;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: #0f3460;
      border: 1px solid #1a4a7a;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 12px;
      -webkit-appearance: none;
    }

    input:focus {
      outline: none;
      border-color: #7ec8e3;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > div { flex: 1; }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:active { opacity: 0.8; }

    .btn-primary {
      background: #7ec8e3;
      color: #1a1a2e;
    }

    .btn-secondary {
      background: #0f3460;
      color: #7ec8e3;
      border: 1px solid #1a4a7a;
      margin-top: 8px;
    }

    .btn-stop {
      background: #c0392b;
      color: #fff;
      margin-top: 8px;
      display: none;
    }

    .btn-danger {
      background: transparent;
      color: #e74c3c;
      border: 1px solid #e74c3c;
      margin-top: 8px;
    }

    /* Saved stations list */
    .station-list { margin-bottom: 12px; }

    .station-item {
      display: flex;
      align-items: center;
      background: #0f3460;
      border: 1px solid #1a4a7a;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      gap: 10px;
    }

    .station-item-info {
      flex: 1;
      cursor: pointer;
    }

    .station-item-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .station-item-dist {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 2px;
    }

    .station-item-actions {
      display: flex;
      gap: 6px;
    }

    .station-item-actions button {
      width: auto;
      padding: 6px 10px;
      font-size: 0.8rem;
      border-radius: 8px;
      margin: 0;
    }

    .btn-track {
      background: #7ec8e3;
      color: #1a1a2e;
    }

    .btn-delete {
      background: transparent;
      color: #e74c3c;
      border: 1px solid #e74c3c;
    }

    .empty-state {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      padding: 12px 0;
    }

    /* collapsible add form */
    #addFormToggle {
      background: #0f3460;
      color: #7ec8e3;
      border: 1px dashed #1a4a7a;
      margin-top: 0;
      font-size: 0.9rem;
      padding: 10px;
    }

    #addForm { margin-top: 14px; }

    .status-box {
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 4px;
    }

    .status-idle     { background: #0f3460; }
    .status-tracking { background: #1a5276; }
    .status-near     { background: #1e8449; animation: pulse 1s infinite; }
    .status-arrived  { background: #c0392b; animation: pulse 0.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }

    .status-icon { font-size: 2.2rem; margin-bottom: 6px; }
    .status-text { font-size: 1rem; font-weight: 600; }
    .status-sub  { font-size: 0.82rem; color: #ccc; margin-top: 4px; }

    .distance-big {
      font-size: 2.8rem;
      font-weight: 800;
      color: #7ec8e3;
      text-align: center;
      margin: 8px 0 2px;
    }

    .coords-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #888;
      margin-top: 4px;
    }

    .tip {
      font-size: 0.78rem;
      color: #888;
      text-align: center;
      margin-top: 8px;
      line-height: 1.5;
    }

    #alertOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(192,57,43,0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    #alertOverlay.show { display: flex; }

    @keyframes flashBg {
      0%, 100% { background: rgba(192,57,43,0.95); }
      50%       { background: rgba(231,76,60,1); }
    }

    #alertOverlay.show { animation: flashBg 0.5s infinite; }

    #alertOverlay .big-icon { font-size: 5rem; margin-bottom: 16px; animation: pulse 0.5s infinite; }
    #alertOverlay h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; }
    #alertOverlay p  { font-size: 1.1rem; color: #ffe; margin-bottom: 32px; }

    #alertOverlay button {
      max-width: 280px;
      background: #fff;
      color: #c0392b;
      font-size: 1.2rem;
      font-weight: 800;
      padding: 18px;
      border-radius: 14px;
    }
  </style>
</head>
<body>

  <h1>🚂 Train Alert</h1>
  <p class="subtitle">Get notified before your stop</p>

  <!-- SAVED STATIONS -->
  <div class="card">
    <h2>My Stations</h2>
    <div class="station-list" id="stationList"></div>
    <button id="addFormToggle" onclick="toggleAddForm()">＋ Add a station</button>
    <div id="addForm" style="display:none">
      <label>Station name</label>
      <input type="text" id="stationName" placeholder="e.g. Central Station">
      <div class="row">
        <div>
          <label>Latitude</label>
          <input type="number" id="lat" placeholder="51.5074" step="any">
        </div>
        <div>
          <label>Longitude</label>
          <input type="number" id="lng" placeholder="-0.1278" step="any">
        </div>
      </div>
      <label>Alert distance (metres)</label>
      <input type="number" id="alertDist" value="500" min="50" max="5000">
      <button class="btn-secondary" onclick="useCurrentLocation()">📍 I'm at the station — use my location</button>
      <button class="btn-primary" style="margin-top:10px" onclick="saveStation()">Save Station</button>
      <p class="tip">Look up coordinates: <strong>maps.apple.com</strong> → drop a pin → share → copy</p>
    </div>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h2>Status</h2>
    <div id="statusBox" class="status-box status-idle">
      <div class="status-icon">🛑</div>
      <div class="status-text">Not tracking</div>
      <div class="status-sub">Tap Track on a saved station</div>
    </div>
    <div id="distanceDisplay" style="display:none">
      <div class="distance-big" id="distanceVal">—</div>
      <div class="coords-row">
        <span id="myCoords">—</span>
        <span id="accuracy">—</span>
      </div>
    </div>
    <button class="btn-stop" id="stopBtn" onclick="stopTracking()">Stop Tracking</button>
  </div>

  <!-- FULL-SCREEN ALERT OVERLAY -->
  <div id="alertOverlay">
    <div class="big-icon">🚨</div>
    <h2 id="alertTitle">Approaching station!</h2>
    <p id="alertBody">Your stop is coming up. Get ready!</p>
    <button onclick="dismissAlert()">Dismiss</button>
  </div>

<script>
  let watchId = null;
  let audioCtx = null;
  let alerted = false;
  let stationLat = null, stationLng = null;
  let addFormOpen = false;
  let alarmInterval = null;
  let vibrateInterval = null;
  let alarmNodes = [];
  let wakeLock = null;

  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      // Re-acquire if page becomes visible again (e.g. user switches back)
      document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && watchId !== null) {
          try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
        }
      });
    } catch(e) {}
  }

  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  // --- station storage ---
  function loadStations() {
    try { return JSON.parse(localStorage.getItem('trainAlertStations') || '[]'); }
    catch(e) { return []; }
  }

  function saveStations(stations) {
    localStorage.setItem('trainAlertStations', JSON.stringify(stations));
  }

  function saveStation() {
    const name = document.getElementById('stationName').value.trim();
    const lat  = parseFloat(document.getElementById('lat').value);
    const lng  = parseFloat(document.getElementById('lng').value);
    const dist = parseInt(document.getElementById('alertDist').value) || 500;

    if (!name) { alert('Please enter a station name.'); return; }
    if (isNaN(lat) || isNaN(lng)) { alert('Please enter valid coordinates.'); return; }

    const stations = loadStations();
    stations.push({ id: Date.now(), name, lat, lng, dist });
    saveStations(stations);

    // reset form
    document.getElementById('stationName').value = '';
    document.getElementById('lat').value = '';
    document.getElementById('lng').value = '';
    document.getElementById('alertDist').value = '500';
    toggleAddForm(false);
    renderStations();
  }

  function deleteStation(id) {
    const stations = loadStations().filter(s => s.id !== id);
    saveStations(stations);
    renderStations();
  }

  function renderStations() {
    const stations = loadStations();
    const list = document.getElementById('stationList');

    if (stations.length === 0) {
      list.innerHTML = '<div class="empty-state">No stations saved yet</div>';
      return;
    }

    list.innerHTML = stations.map(s => `
      <div class="station-item">
        <div class="station-item-info" onclick="startTracking(${s.id})">
          <div class="station-item-name">🚉 ${s.name}</div>
          <div class="station-item-dist">Alert at ${s.dist} m</div>
        </div>
        <div class="station-item-actions">
          <button class="btn-track" onclick="startTracking(${s.id})">Track</button>
          <button class="btn-delete" onclick="deleteStation(${s.id})">✕</button>
        </div>
      </div>
    `).join('');
  }

  // --- add form toggle ---
  function toggleAddForm(forceState) {
    addFormOpen = forceState !== undefined ? forceState : !addFormOpen;
    document.getElementById('addForm').style.display = addFormOpen ? 'block' : 'none';
    document.getElementById('addFormToggle').textContent = addFormOpen ? '✕ Cancel' : '＋ Add a station';
  }

  // --- geolocation ---
  function startTracking(stationId) {
    const stations = loadStations();
    const station = stations.find(s => s.id === stationId);
    if (!station) return;

    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); }

    stationLat = station.lat;
    stationLng = station.lng;
    alerted = false;

    // unlock audio on iOS (must be inside user gesture)
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    requestWakeLock();
    setStatus('tracking', '📡', 'Tracking…', `Looking for ${station.name}`);
    document.getElementById('distanceDisplay').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'block';

    watchId = navigator.geolocation.watchPosition(
      pos => onPosition(pos, station.dist, station.name),
      err => onError(err),
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 20000 }
    );
  }

  function stopTracking() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    setStatus('idle', '🛑', 'Not tracking', 'Tap Track on a saved station');
    document.getElementById('distanceDisplay').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('alertOverlay').classList.remove('show');
    stopAlarm();
    releaseWakeLock();
    alerted = false;
  }

  function onPosition(pos, alertDist, name) {
    const { latitude, longitude, accuracy } = pos.coords;
    const d = haversine(latitude, longitude, stationLat, stationLng);
    const dLabel = d < 1000 ? `${Math.round(d)} m` : `${(d/1000).toFixed(1)} km`;

    document.getElementById('distanceVal').textContent = dLabel;
    document.getElementById('myCoords').textContent = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
    document.getElementById('accuracy').textContent = `±${Math.round(accuracy)} m`;

    if (d <= alertDist && !alerted) {
      alerted = true;
      triggerAlert(name, dLabel);
    } else if (d <= alertDist) {
      setStatus('near', '🚉', 'Almost there!', `${dLabel} to ${name}`);
    } else {
      setStatus('tracking', '📡', 'Tracking…', `${dLabel} to ${name}`);
    }
  }

  function onError(err) {
    const msgs = {
      1: 'Location permission denied. Please allow location access in Settings → Safari → Location.',
      2: 'Location unavailable. Make sure you have GPS signal.',
      3: 'Location request timed out.',
    };
    setStatus('idle', '⚠️', 'GPS error', msgs[err.code] || err.message);
  }

  function triggerAlert(name, dist) {
    document.getElementById('alertTitle').textContent = `Approaching ${name}!`;
    document.getElementById('alertBody').textContent  = `You are ${dist} away. Get ready to disembark!`;
    document.getElementById('alertOverlay').classList.add('show');
    setStatus('arrived', '🚨', 'STATION APPROACHING', `Get ready!`);

    startAlarmSound();
    startVibrateLoop();

    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(`🚂 Approaching ${name}`, {
        body: `You are ${dist} away. Get ready!`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🚂</text></svg>',
        tag: 'train-alert',
        requireInteraction: true,
      });
    }

    // Re-fire alarm every 8 seconds if not dismissed
    alarmInterval = setInterval(() => {
      if (document.getElementById('alertOverlay').classList.contains('show')) {
        startAlarmSound();
      }
    }, 8000);
  }

  function startAlarmSound() {
    if (!audioCtx) return;
    // Two-tone siren: high then low, 4 pairs
    const pattern = [960, 640, 960, 640, 960, 640, 960, 640];
    pattern.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = freq;
      o.type = 'square';
      const t = audioCtx.currentTime + i * 0.18;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.6, t + 0.02);
      g.gain.setValueAtTime(0.6, t + 0.14);
      g.gain.linearRampToValueAtTime(0, t + 0.18);
      o.start(t);
      o.stop(t + 0.18);
      alarmNodes.push(o);
    });
  }

  function startVibrateLoop() {
    if (!('vibrate' in navigator)) return;
    // Immediately vibrate, then repeat every 2s until dismissed
    const pattern = [400, 150, 400, 150, 600];
    navigator.vibrate(pattern);
    vibrateInterval = setInterval(() => {
      if (document.getElementById('alertOverlay').classList.contains('show')) {
        navigator.vibrate(pattern);
      }
    }, 2000);
  }

  function stopAlarm() {
    if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
    if (vibrateInterval) { clearInterval(vibrateInterval); vibrateInterval = null; }
    if ('vibrate' in navigator) navigator.vibrate(0);
    alarmNodes = [];
  }

  function dismissAlert() {
    document.getElementById('alertOverlay').classList.remove('show');
    stopAlarm();
  }

  function useCurrentLocation() {
    if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
      document.getElementById('lng').value = pos.coords.longitude.toFixed(6);
    }, err => alert('Could not get location: ' + err.message), { enableHighAccuracy: true });
  }

  // --- helpers ---
  function setStatus(type, icon, text, sub) {
    const box = document.getElementById('statusBox');
    box.className = `status-box status-${type}`;
    box.innerHTML = `<div class="status-icon">${icon}</div><div class="status-text">${text}</div><div class="status-sub">${sub}</div>`;
  }

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function beep(ctx) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    o.type = 'sine';
    g.gain.setValueAtTime(0.5, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.3);
  }

  // --- init ---
  // migrate old single-station data if present
  try {
    const old = JSON.parse(localStorage.getItem('trainAlert') || 'null');
    if (old && old.name && old.lat) {
      const stations = loadStations();
      if (stations.length === 0) {
        stations.push({ id: Date.now(), name: old.name, lat: parseFloat(old.lat), lng: parseFloat(old.lng), dist: parseInt(old.dist) || 500 });
        saveStations(stations);
        localStorage.removeItem('trainAlert');
      }
    }
  } catch(e) {}

  renderStations();

  if (!navigator.geolocation) {
    document.getElementById('stopBtn').disabled = true;
  }
</script>
</body>
</html>
